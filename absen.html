<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi - Admin Guru</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .card { max-width: 900px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; background: #e8f4f8; padding: 15px; border-radius: 5px; border-left: 4px solid #3498db; }
        .toolbar-item { display: flex; flex-direction: column; gap: 5px; }
        .toolbar-item label { font-size: 0.85em; font-weight: bold; color: #2c3e50; }
        input[type="date"], select { padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; font-weight: bold; min-width: 150px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th { background-color: #2c3e50; color: white; padding: 12px 10px; border: 1px solid #bdc3c7; text-align: center; }
        td { padding: 10px; border: 1px solid #bdc3c7; text-align: left; vertical-align: middle; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        /* Tombol Interaktif Absensi */
        .btn-absen-group { display: flex; gap: 5px; justify-content: center; }
        .btn-abs { padding: 8px 12px; border: 1px solid #bdc3c7; background: #fdfdfd; color: #95a5a6; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        
        .btn-abs[data-status="H"]:hover, .btn-abs[data-status="H"].active { background: #2ecc71; color: white; border-color: #2ecc71; }
        .btn-abs[data-status="S"]:hover, .btn-abs[data-status="S"].active { background: #f1c40f; color: white; border-color: #f1c40f; }
        .btn-abs[data-status="I"]:hover, .btn-abs[data-status="I"].active { background: #3498db; color: white; border-color: #3498db; }
        .btn-abs[data-status="A"]:hover, .btn-abs[data-status="A"].active { background: #e74c3c; color: white; border-color: #e74c3c; }

        input.keterangan { width: 100%; padding: 8px; border: 1px solid #bdc3c7; border-radius: 3px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card active" id="view-absen">
            <h1>📝 Absensi Harian</h1>
            <div class="subtitle">Input dan Edit Kehadiran Siswa</div>
            
            <div id="alert-absen" class="alert-custom"></div>

            <div class="toolbar">
                <div class="toolbar-item">
                    <label>Tanggal Absensi:</label>
                    <input type="date" id="input-tanggal" onchange="muatAbsensi()">
                </div>
                <div class="toolbar-item">
                    <label>Pilih Kelas:</label>
                    <select id="select-kelas" onchange="muatAbsensi()">
                        <option value="">Pilih Kelas...</option>
                    </select>
                </div>
                <div style="flex-grow: 1; text-align: right;">
                    <span id="badge-status" style="padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; background: #ecf0f1; color: #7f8c8d;">Pilih Tanggal & Kelas</span>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
                <div id="info-hari" style="color: #e74c3c; font-weight: bold; font-size: 0.9em; display: none;">
                    <i class="fas fa-exclamation-circle"></i> Peringatan: Anda memilih Hari Minggu / Libur.
                </div>
                <div style="margin-left: auto; display: flex; gap: 10px;">
                    <button class="btn btn-sm btn-secondary" onclick="window.location.href='index.html'">Kembali</button>
                    <button class="btn btn-sm" style="background-color: #9b59b6; color: white;" onclick="alert('Fitur Rekap & Cetak akan segera hadir di Tahap 2!')"><i class="fas fa-print"></i> Pusat Rekap</button> 
                    <button class="btn btn-sm btn-success" id="btn-simpan-absen" onclick="simpanAbsensi()"><i class="fas fa-save"></i> Simpan Absensi</button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th width="5%">No</th>
                            <th>Nama Lengkap</th>
                            <th width="5%">L/P</th>
                            <th width="30%">Kehadiran</th>
                            <th width="20%">Keterangan</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-absen">
                        <tr><td colspan="5" style="text-align:center; color: #7f8c8d;">Silakan pilih tanggal dan kelas terlebih dahulu.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <div class="footer">© 2026 Hak Cipta Milik 3D Creative.</div>

    <script src="config.js"></script>
    <script>
        let userAktif = null;
        let dataAbsenSaatIni = []; // Menyimpan state absensi di tabel
        
        window.onload = () => {
            userAktif = JSON.parse(localStorage.getItem('userAdminGuru'));
            if (!userAktif || userAktif.status_akun !== 'aktif') return window.location.href = 'login.html';
            
            // Set default tanggal hari ini
            document.getElementById('input-tanggal').valueAsDate = new Date();
            
            muatDaftarKelas();
        };

        function setSubmitting(btnId, isSubmit, textAwal) {
            const btn = document.getElementById(btnId);
            if (isSubmit) { btn.disabled = true; btn.innerHTML = `${textAwal} <span class="spinner"></span>`; } 
            else { btn.disabled = false; btn.innerHTML = textAwal; }
        }

        // --- AMBIL DAFTAR KELAS DARI SHEET DATA_SISWA ---
        function muatDaftarKelas() {
            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=get_data_siswa&url=${encodeURIComponent(userAktif.url)}` 
            }).then(r => r.json()).then(res => {
                if(res.status === 'success') {
                    const select = document.getElementById('select-kelas');
                    const kelasUnik = [...new Set(res.data.map(s => s.kelas))];
                    
                    if (kelasUnik.length > 0) {
                        select.innerHTML = '<option value="">Pilih Kelas...</option>';
                        kelasUnik.forEach(k => select.innerHTML += `<option value="${k}">${k}</option>`);
                    } else {
                        select.innerHTML = '<option value="">Belum ada kelas</option>';
                    }
                }
            });
        }

        // --- MUAT FORM ABSENSI ---
        function muatAbsensi() {
            const tanggal = document.getElementById('input-tanggal').value;
            const kelas = document.getElementById('select-kelas').value;
            const tbody = document.getElementById('tabel-absen');
            const infoHari = document.getElementById('info-hari');
            const badge = document.getElementById('badge-status');

            if (!tanggal || !kelas) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color: #7f8c8d;">Silakan pilih tanggal dan kelas terlebih dahulu.</td></tr>';
                badge.innerText = "Pilih Tanggal & Kelas";
                badge.style.background = "#ecf0f1"; badge.style.color = "#7f8c8d";
                return;
            }

            // Cek Hari Minggu
            const d = new Date(tanggal);
            infoHari.style.display = (d.getDay() === 0) ? 'block' : 'none';

            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Memuat data absensi... <span class="spinner" style="border-top-color:#3498db;"></span></td></tr>';
            badge.innerText = "Memuat...";

            // Konversi tanggal format lokal untuk dikirim ke backend (misal: 2026-06-22)
            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=get_absen&url=${encodeURIComponent(userAktif.url)}&kelas=${encodeURIComponent(kelas)}&tanggal=${encodeURIComponent(tanggal)}` 
            }).then(r => r.json()).then(res => {
                if(res.status === 'success') {
                    dataAbsenSaatIni = res.data;
                    
                    if (res.isEdit) {
                        badge.innerText = "Mode Edit Data Lama";
                        badge.style.background = "#f1c40f"; badge.style.color = "white";
                    } else {
                        badge.innerText = "Mode Input Baru";
                        badge.style.background = "#3498db"; badge.style.color = "white";
                    }
                    
                    renderTabelAbsen();
                } else if(res.status === 'empty_siswa') {
                    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; color: #e74c3c;">${res.message} Tambahkan siswa di menu Data Siswa dulu.</td></tr>`;
                    badge.innerText = "Kelas Kosong";
                } else {
                    showAlert('error', 'Gagal menarik data.', 'alert-absen');
                }
            });
        }

        // --- RENDER TABEL & TOMBOL INTERAKTIF ---
        function renderTabelAbsen() {
            const tbody = document.getElementById('tabel-absen');
            tbody.innerHTML = '';
            
            dataAbsenSaatIni.forEach((s, index) => {
                // Menentukan tombol mana yang aktif
                const actH = s.status === 'H' ? 'active' : '';
                const actS = s.status === 'S' ? 'active' : '';
                const actI = s.status === 'I' ? 'active' : '';
                const actA = s.status === 'A' ? 'active' : '';

                // Efek arsiran jika baris tersebut Alpa (A)
                const bgRow = s.status === 'A' ? 'background-color: #fdf3f2;' : '';

                const tr = document.createElement('tr');
                tr.style = bgRow;
                tr.innerHTML = `
                    <td style="text-align:center;">${s.noAbsen}</td>
                    <td style="font-weight:bold;">${s.namaLengkap}</td>
                    <td style="text-align:center;">${s.lp}</td>
                    <td>
                        <div class="btn-absen-group">
                            <button class="btn-abs ${actH}" data-status="H" onclick="ubahStatus(${index}, 'H')">H</button>
                            <button class="btn-abs ${actS}" data-status="S" onclick="ubahStatus(${index}, 'S')">S</button>
                            <button class="btn-abs ${actI}" data-status="I" onclick="ubahStatus(${index}, 'I')">I</button>
                            <button class="btn-abs ${actA}" data-status="A" onclick="ubahStatus(${index}, 'A')">A</button>
                        </div>
                    </td>
                    <td>
                        <input type="text" class="keterangan" value="${s.keterangan}" placeholder="Opsional..." onchange="ubahKet(${index}, this.value)">
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function ubahStatus(index, statusBaru) {
            dataAbsenSaatIni[index].status = statusBaru;
            renderTabelAbsen(); // Re-render agar warna tombol berubah otomatis
        }

        function ubahKet(index, ketBaru) {
            dataAbsenSaatIni[index].keterangan = ketBaru;
        }

        // --- SIMPAN KE GOOGLE SHEETS ---
        function simpanAbsensi() {
            const tanggal = document.getElementById('input-tanggal').value;
            const kelas = document.getElementById('select-kelas').value;

            if (!tanggal || !kelas) return showAlert('error', 'Tanggal dan Kelas harus dipilih!', 'alert-absen');
            if (dataAbsenSaatIni.length === 0) return showAlert('error', 'Tidak ada data absen untuk disimpan.', 'alert-absen');

            setSubmitting('btn-simpan-absen', true, '<i class="fas fa-save"></i> Menyimpan...');

            const payload = {
                tanggal: tanggal,
                kelas: kelas,
                absensiSiswa: dataAbsenSaatIni
            };

            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=save_absen&url=${encodeURIComponent(userAktif.url)}&data=${encodeURIComponent(JSON.stringify(payload))}` 
            }).then(r => r.json()).then(res => {
                setSubmitting('btn-simpan-absen', false, '<i class="fas fa-save"></i> Simpan Absensi');
                if(res.status === 'success') {
                    showAlert('success', res.message, 'alert-absen');
                    // Ubah badge jadi Mode Edit setelah sukses simpan
                    const badge = document.getElementById('badge-status');
                    badge.innerText = "Tersimpan (Mode Edit)";
                    badge.style.background = "#f1c40f"; badge.style.color = "white";
                } else {
                    showAlert('error', res.message, 'alert-absen');
                }
            }).catch(() => {
                setSubmitting('btn-simpan-absen', false, '<i class="fas fa-save"></i> Simpan Absensi');
                showAlert('error', 'Koneksi gagal saat menyimpan.', 'alert-absen');
            });
        }
    </script>
</body>
</html>
