<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Siswa - Admin Guru</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .card { max-width: 800px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; align-items: center; justify-content: space-between; background: #e8f4f8; padding: 15px; border-radius: 5px; border-left: 4px solid #3498db; }
        select { padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; min-width: 150px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        /* Perbaikan: Header Tabel di-center */
        th { background-color: #2c3e50; color: white; padding: 12px 10px; border: 1px solid #bdc3c7; text-align: center; font-size: 0.9em; }
        td { padding: 12px 10px; border: 1px solid #bdc3c7; text-align: left; font-size: 0.9em; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-sm { padding: 8px 12px; font-size: 0.85em; width: auto; margin: 0; }
        
        /* Modal Form CSS */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="card active" id="view-datasiswa">
            <h1>👥 Data Kelas & Siswa</h1>
            <div class="subtitle">Manajemen Daftar Siswa Per Kelas</div>
            
            <div id="alert-datasiswa" class="alert-custom"></div>

            <div class="toolbar">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <label>Pilih Kelas:</label>
                    <select id="select-kelas" onchange="renderTabelSiswa()"></select>
                    <button class="btn btn-sm btn-secondary" onclick="tambahKelasBaru()">+ Buat Kelas</button>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <button class="btn btn-sm btn-success" id="btn-tambah" onclick="bukaModalSiswa()">+ Tambah Siswa</button>
                
                <div style="display: flex; gap: 10px;">
                    <input type="file" id="file-excel" accept=".xlsx, .xls" style="display: none;" onchange="prosesImportExcel(event)">
                    <button class="btn btn-sm" style="background-color: #f39c12; color: white;" id="btn-import" onclick="document.getElementById('file-excel').click()">📥 Import Excel</button>
                    <button class="btn btn-sm btn-secondary" onclick="window.location.href='index.html'">Kembali</button>
                </div>
            </div>

            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th width="10%">No</th>
                            <th>Nama Lengkap</th>
                            <th width="10%">L/P</th>
                            <th width="15%">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-body">
                        <tr><td colspan="4" style="text-align:center;">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-siswa">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-top:0;">Tambah Siswa</h2>
            <div class="form-group"><label>No Absen</label><input type="number" id="form-no"></div>
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="form-nama"></div>
            <div class="form-group">
                <label>L/P</label>
                <select id="form-lp" style="width:100%;"><option value="L">L</option><option value="P">P</option></select>
            </div>
            <input type="hidden" id="form-rowindex">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="tutupModal()">Batal</button>
                <button class="btn btn-success" style="flex: 1;" id="btn-simpan-siswa" onclick="simpanSiswa()">Simpan</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-kelas">
        <div class="modal-content">
            <h2 style="margin-top:0;">Tambah Kelas</h2>
            <p style="color: #7f8c8d; font-size: 0.9em;">Masukkan nama kelas baru (Contoh: Kelas 1A atau Matematika VII)</p>
            <div class="form-group">
                <input type="text" id="input-nama-kelas" placeholder="Ketik nama kelas di sini..." style="width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px;">
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="tutupModalKelas()">Batal</button>
                <button class="btn btn-success" style="flex: 1;" onclick="simpanKelasBaru()">Simpan</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-hapus">
        <div class="modal-content" style="text-align: center;">
            <div style="font-size: 3em; color: #e74c3c; margin-bottom: 10px;"><i class="fas fa-exclamation-circle"></i></div>
            <h2 style="margin-top:0; color: #e74c3c;">Konfirmasi Hapus</h2>
            <p id="teks-konfirmasi-hapus" style="margin-bottom: 20px;">Yakin ingin menghapus data ini?</p>
            <input type="hidden" id="hapus-rowindex">
            <div style="display:flex; gap:10px; justify-content: center;">
                <button class="btn btn-secondary" style="flex: 1;" onclick="tutupModalHapus()">Batal</button>
                <button class="btn btn-danger" style="flex: 1;" onclick="eksekusiHapus()">Ya, Hapus!</button>
            </div>
        </div>
    </div>
    
    <div class="footer">© 2026 Hak Cipta Milik 3D Creative.</div>

    <script src="config.js"></script>
    <script>
        let userAktif = null;
        let semuaSiswa = []; 
        
        window.onload = () => {
            userAktif = JSON.parse(localStorage.getItem('userAdminGuru'));
            if (!userAktif || userAktif.status_akun !== 'aktif') return window.location.href = 'login.html';
            muatDataDatabase();
        };

        function setSubmitting(btnId, isSubmit, textAwal) {
            const btn = document.getElementById(btnId);
            if (isSubmit) { btn.disabled = true; btn.innerHTML = `${textAwal} <span class="spinner"></span>`; } 
            else { btn.disabled = false; btn.innerHTML = textAwal; }
        }

        // --- FETCH DARI GOOGLE SHEETS ---
        function muatDataDatabase() {
            document.getElementById('tabel-body').innerHTML = '<tr><td colspan="4" style="text-align:center;">Mengecek database... <span class="spinner" style="border-top-color:#3498db;"></span></td></tr>';
            
            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=get_data_siswa&url=${encodeURIComponent(userAktif.url)}` 
            })
            .then(r => r.json()).then(res => {
                if(res.status === 'success') {
                    semuaSiswa = res.data;
                    ekstrakKelas();
                } else showAlert('error', 'Gagal memuat data!', 'alert-datasiswa');
            });
        }

        function ekstrakKelas() {
            const select = document.getElementById('select-kelas');
            const kelasSebelumnya = select.value; 
            
            const kelasUnik = [...new Set(semuaSiswa.map(s => s.kelas))];
            
            select.innerHTML = kelasUnik.length > 0 ? '' : '<option value="">Belum ada kelas</option>';
            kelasUnik.forEach(k => {
                const opt = document.createElement('option');
                opt.value = k; opt.innerText = k;
                select.appendChild(opt);
            });
            
            if (kelasSebelumnya && kelasUnik.includes(kelasSebelumnya)) {
                select.value = kelasSebelumnya;
            }
            
            renderTabelSiswa();
        }

        function renderTabelSiswa() {
            const tbody = document.getElementById('tabel-body');
            const kelasAktif = document.getElementById('select-kelas').value;
            if(!kelasAktif) return tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Silakan buat kelas terlebih dahulu.</td></tr>';
            
            const siswaKelasIni = semuaSiswa.filter(s => s.kelas === kelasAktif).sort((a,b) => a.noAbsen - b.noAbsen);
            
            if(siswaKelasIni.length === 0) return tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Belum ada siswa di kelas ini. Tambahkan manual atau Import Excel.</td></tr>';
            
            tbody.innerHTML = '';
            siswaKelasIni.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center;">${s.noAbsen}</td>
                    <td style="font-weight:bold;">${s.namaLengkap}</td>
                    <td style="text-align:center;">${s.lp}</td>
                    <td style="text-align:center;">
                        <div style="display: flex; gap: 5px; justify-content: center;">
                            <button class="btn btn-sm btn-secondary" onclick="editSiswa(${s.rowIndex})" title="Edit"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-sm btn-danger" onclick="konfirmasiHapus(${s.rowIndex}, '${s.namaLengkap}')" title="Hapus"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>`;
                tbody.appendChild(tr);
            });
        }

        // --- TAMBAH KELAS CUSTOM MODAL ---
        function tambahKelasBaru() {
            document.getElementById('input-nama-kelas').value = '';
            document.getElementById('modal-kelas').classList.add('active');
            setTimeout(() => document.getElementById('input-nama-kelas').focus(), 100);
        }

        function tutupModalKelas() {
            document.getElementById('modal-kelas').classList.remove('active');
        }

        function simpanKelasBaru() {
            const namaKelas = document.getElementById('input-nama-kelas').value;
            if (namaKelas && namaKelas.trim() !== "") {
                const select = document.getElementById('select-kelas');
                
                if([...select.options].find(o => o.value === namaKelas)) {
                    tutupModalKelas();
                    return showAlert('error', 'Kelas tersebut sudah ada!', 'alert-datasiswa');
                }
                
                if(select.options[0] && select.options[0].value === "") select.innerHTML = ''; 
                
                const opt = document.createElement('option');
                opt.value = namaKelas; opt.innerText = namaKelas;
                select.appendChild(opt);
                select.value = namaKelas;
                
                renderTabelSiswa();
                tutupModalKelas();
                showAlert('success', `Kelas ${namaKelas} berhasil ditambahkan.`, 'alert-datasiswa');
            } else {
                showAlert('error', 'Nama kelas tidak boleh kosong!', 'alert-datasiswa');
            }
        }

        // --- CRUD SISWA ---
        function bukaModalSiswa(rowIndex = null) {
            const kelasAktif = document.getElementById('select-kelas').value;
            if(!kelasAktif) return showAlert('error', 'Buat kelas dulu sebelum menambah siswa!', 'alert-datasiswa');
            
            document.getElementById('modal-siswa').classList.add('active');
            if (rowIndex) {
                document.getElementById('modal-title').innerText = "Edit Siswa";
                const s = semuaSiswa.find(x => x.rowIndex === rowIndex);
                document.getElementById('form-no').value = s.noAbsen;
                document.getElementById('form-nama').value = s.namaLengkap;
                document.getElementById('form-lp').value = s.lp;
                document.getElementById('form-rowindex').value = s.rowIndex;
            } else {
                document.getElementById('modal-title').innerText = "Tambah Siswa Baru";
                document.getElementById('form-no').value = '';
                document.getElementById('form-nama').value = '';
                document.getElementById('form-rowindex').value = '';
            }
        }

        function tutupModal() { document.getElementById('modal-siswa').classList.remove('active'); }

        function simpanSiswa() {
            const kelas = document.getElementById('select-kelas').value;
            const noAbsen = document.getElementById('form-no').value;
            const namaLengkap = document.getElementById('form-nama').value;
            const lp = document.getElementById('form-lp').value;
            const rowIndex = document.getElementById('form-rowindex').value;

            if(!noAbsen || !namaLengkap) {
                tutupModal();
                return showAlert('error', 'Nomor Absen dan Nama wajib diisi!', 'alert-datasiswa');
            }
            
            setSubmitting('btn-simpan-siswa', true, 'Menyimpan...');
            const dataSiswa = { kelas, noAbsen, namaLengkap, lp, rowIndex: rowIndex || null };

            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=save_siswa&url=${encodeURIComponent(userAktif.url)}&data=${encodeURIComponent(JSON.stringify(dataSiswa))}` 
            }).then(r => r.json()).then(res => {
                setSubmitting('btn-simpan-siswa', false, 'Simpan');
                tutupModal();
                if(res.status === 'success') {
                    showAlert('success', res.message, 'alert-datasiswa');
                    muatDataDatabase(); 
                } else showAlert('error', res.message, 'alert-datasiswa');
            });
        }

        function editSiswa(rowIndex) { bukaModalSiswa(rowIndex); }

        // --- HAPUS SISWA CUSTOM MODAL ---
        function konfirmasiHapus(rowIndex, namaLengkap) {
            document.getElementById('teks-konfirmasi-hapus').innerHTML = `Apakah Anda yakin ingin menghapus data siswa bernama <b>"${namaLengkap}"</b>?`;
            document.getElementById('hapus-rowindex').value = rowIndex;
            document.getElementById('modal-hapus').classList.add('active');
        }

        function tutupModalHapus() {
            document.getElementById('modal-hapus').classList.remove('active');
        }

        function eksekusiHapus() {
            const rowIndex = document.getElementById('hapus-rowindex').value;
            tutupModalHapus(); 
            
            showAlert('error', 'Sedang menghapus data...', 'alert-datasiswa');

            fetch(APPS_SCRIPT_URL, { 
                method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                body: `action=delete_siswa&url=${encodeURIComponent(userAktif.url)}&data=${encodeURIComponent(JSON.stringify({rowIndex}))}` 
            }).then(r => r.json()).then(res => {
                if(res.status === 'success') {
                    showAlert('success', 'Data siswa berhasil dihapus!', 'alert-datasiswa');
                    muatDataDatabase();
                } else {
                    showAlert('error', 'Gagal menghapus data.', 'alert-datasiswa');
                }
            }).catch(() => {
                showAlert('error', 'Koneksi terputus. Gagal menghapus.', 'alert-datasiswa');
            });
        }

        // --- IMPORT EXCEL CERDAS ---
        function prosesImportExcel(event) {
            const file = event.target.files[0];
            if(!file) return;
            const kelasAktif = document.getElementById('select-kelas').value;
            if(!kelasAktif) return showAlert('error', 'Buat atau pilih kelas dulu!', 'alert-datasiswa');
            
            setSubmitting('btn-import', true, 'Membaca Excel...');

            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                const rows = XLSX.utils.sheet_to_json(firstSheet, {header: 1});
                
                let toImport = [];
                for(let i = 1; i < rows.length; i++) {
                    const row = rows[i];
                    if(row.length >= 2 && row[1]) {
                        toImport.push({
                            kelas: kelasAktif,
                            noAbsen: row[0] || i,
                            namaLengkap: row[1],
                            lp: (row[2] && row[2].toString().toUpperCase() === 'P') ? 'P' : 'L'
                        });
                    }
                }

                if(toImport.length === 0) {
                    setSubmitting('btn-import', false, '📥 Import Excel');
                    return showAlert('error', 'Gagal! Format Excel harus: Kolom 1=No, Kolom 2=Nama, Kolom 3=L/P', 'alert-datasiswa');
                }

                setSubmitting('btn-import', true, 'Mengirim ke Server...');
                
                fetch(APPS_SCRIPT_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, 
                    body: `action=import_siswa&url=${encodeURIComponent(userAktif.url)}&data=${encodeURIComponent(JSON.stringify(toImport))}` 
                }).then(r => r.json()).then(res => {
                    setSubmitting('btn-import', false, '<i class="fas fa-file-import"></i> Import Excel');
                    document.getElementById('file-excel').value = ''; 
                    if(res.status === 'success') {
                        showAlert('success', res.message, 'alert-datasiswa');
                        muatDataDatabase();
                    } else showAlert('error', res.message, 'alert-datasiswa');
                });
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
</body>
</html>
